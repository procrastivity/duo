name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  pull_request:
    paths:
      - '.github/workflows/release-bin.yml'
      - 'scripts/build-bin.mjs'
      - 'scripts/build-defines.mjs'
      - 'scripts/smoke-bin.sh'
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'flake.nix'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-bin:
    name: Build binary (${{ matrix.asset_name }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            asset_name: duo-darwin-arm64
            build_script: build:bin:darwin-arm64
          - os: ubuntu-latest
            asset_name: duo-linux-x64
            build_script: build:bin:linux-x64
          - os: ubuntu-24.04-arm
            asset_name: duo-linux-arm64
            build_script: build:bin:linux-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Bun
        # Keep this version in sync with the Bun assertion in flake.nix.
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.11

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install npm deps
        run: npm ci

      - name: Verify package.json version matches tag
        if: github.event_name == 'push'
        run: |
          pkg_version="$(node -p "require('./package.json').version")"
          tag_version="${{ github.ref_name }}"
          tag_version="${tag_version#v}"
          if [ "$pkg_version" != "$tag_version" ]; then
            echo "package.json version ($pkg_version) does not match tag ($tag_version)" >&2
            exit 1
          fi

      - name: Build binary
        run: npm run ${{ matrix.build_script }}

      - name: Smoke test
        run: bash scripts/smoke-bin.sh dist/bin/${{ matrix.asset_name }}

      - name: Upload to GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/bin/${{ matrix.asset_name }}
          body_path: .github/release-template.md
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          fail_on_unmatched_files: true

      - name: Upload artifact (dry-run)
        if: github.event_name != 'push'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: dist/bin/${{ matrix.asset_name }}
          retention-days: 7

  # The release version bump lands in package-lock.json, which changes the
  # buildNpmPackage vendored-deps hash for the from-source `#duo` output.
  # Recompute `npmDepsHash` in flake.nix here and commit it to the default
  # branch so building `#duo` at/after this tag doesn't fail with a hash
  # mismatch. Skipped for prereleases. (Prebuilt-binary packaging now lives in
  # the separate procrastivity/duo.nix repo, which pins the uploaded assets on
  # its own schedule — this workflow no longer maintains an in-repo manifest.)
  refresh-npm-hash:
    name: Refresh npmDepsHash
    needs: build-bin
    if: >-
      github.event_name == 'push'
      && !contains(github.ref_name, '-rc')
      && !contains(github.ref_name, '-alpha')
      && !contains(github.ref_name, '-beta')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@629b284231c2a82554b724e357e47fc6020833c8 # v3.21.2

      # The release version bump lands in package-lock.json, which changes the
      # buildNpmPackage vendored-deps hash. Recompute it here so building `#duo`
      # from source at/after this tag doesn't fail with a hash mismatch.
      - name: Refresh npmDepsHash for ${{ github.ref_name }}
        run: nix shell nixpkgs#prefetch-npm-deps --command node scripts/update-nix-npm-hash.mjs

      - name: Commit nix updates if changed
        run: |
          if git diff --quiet -- flake.nix; then
            echo "flake.nix already up to date for ${{ github.ref_name }}"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore(nix): refresh npmDepsHash for ${{ github.ref_name }}"
          git push origin HEAD:${{ github.event.repository.default_branch }}
